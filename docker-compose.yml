# Multi-Agent Observability + Commander UI
# Usage: docker compose up -d --build
# Observability: http://localhost:4000
# Commander UI:  http://localhost:4200
services:
  observability:
    build: .
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/events.db
    restart: unless-stopped

  commander-ui:
    build:
      context: .
      dockerfile: commander-ui/Dockerfile
    ports:
      - "127.0.0.1:4200:4200"
    volumes:
      - ./commander-ui/data:/app/data
      - ${HOME}/.claude:/root/.claude:ro
    environment:
      - DB_PATH=/app/data/commander.db
      - CLAUDE_HOME=/root/.claude
    restart: unless-stopped
